name: Clone Badge
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Update clone count
        env:
          SECRET_TOKEN: ${{ secrets.SECRET_TOKEN }}
          GIST_ID: 631d76e4fe3264684269cbe20013c158
          USERNAME: PapaBorscht
          REPO: Notify
        run: |
          python3 - <<'EOF'
          import urllib.request, json, os

          token = os.environ['SECRET_TOKEN']
          gist_id = os.environ['GIST_ID']
          username = os.environ['USERNAME']
          repo = os.environ['REPO']

          # Получаем статистику клонов
          req = urllib.request.Request(
            f'https://api.github.com/repos/{username}/{repo}/traffic/clones',
            headers={'Authorization': f'Bearer {token}', 'Accept': 'application/vnd.github+json'}
          )
          data = json.loads(urllib.request.urlopen(req).read())

          # Читаем текущий gist
          req2 = urllib.request.Request(
            f'https://api.github.com/gists/{gist_id}',
            headers={'Authorization': f'Bearer {token}', 'Accept': 'application/vnd.github+json'}
          )
          gist = json.loads(urllib.request.urlopen(req2).read())
          try:
            saved = json.loads(gist['files']['clone.json']['content'])
          except:
            saved = {'count': 0, 'uniques': 0}

          # Накапливаем (берём максимум чтобы не уменьшать)
          result = {
            'count': max(saved.get('count', 0), data['count']),
            'uniques': max(saved.get('uniques', 0), data['uniques'])
          }

          # Обновляем gist
          payload = json.dumps({'files': {'clone.json': {'content': json.dumps(result)}}}).encode()
          req3 = urllib.request.Request(
            f'https://api.github.com/gists/{gist_id}',
            data=payload, method='PATCH',
            headers={'Authorization': f'Bearer {token}', 'Content-Type': 'application/json'}
          )
          urllib.request.urlopen(req3)
          print(f"Updated: {result}")
          EOF
